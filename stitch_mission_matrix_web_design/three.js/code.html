<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_2 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_2" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_2');
  const devicePixelRatio = window.devicePixelRatio || 1;
  const container = document.querySelector('threejs-scene');
const width = container.clientWidth || window.innerWidth;
const height = container.clientHeight || window.innerHeight;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
renderer.setSize(width, height);
renderer.setPixelRatio(window.devicePixelRatio);
container.appendChild(renderer.domElement);

// Create a digital "Avatar" using geometries
const group = new THREE.Group();

// Head
const headGeo = new THREE.IcosahedronGeometry(0.8, 2);
const headMat = new THREE.MeshPhongMaterial({ 
    color: 0x64FFDA, 
    wireframe: true,
    transparent: true,
    opacity: 0.8
});
const head = new THREE.Mesh(headGeo, headMat);
group.add(head);

// Core "Brain"
const coreGeo = new THREE.SphereGeometry(0.4, 32, 32);
const coreMat = new THREE.MeshPhongMaterial({ 
    color: 0x64FFDA, 
    emissive: 0x64FFDA,
    emissiveIntensity: 2
});
const core = new THREE.Mesh(coreGeo, coreMat);
group.add(core);

// Rings
const ringGeo = new THREE.TorusGeometry(1.2, 0.02, 16, 100);
const ringMat = new THREE.MeshBasicMaterial({ color: 0x64FFDA, transparent: true, opacity: 0.4 });
const ring1 = new THREE.Mesh(ringGeo, ringMat);
const ring2 = new THREE.Mesh(ringGeo, ringMat);
ring2.rotation.x = Math.PI / 2;
group.add(ring1);
group.add(ring2);

scene.add(group);

const light = new THREE.PointLight(0x64FFDA, 2, 100);
light.position.set(5, 5, 5);
scene.add(light);
scene.add(new THREE.AmbientLight(0x404040));

camera.position.z = 4;

let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };

container.addEventListener('mousedown', e => isDragging = true);
window.addEventListener('mouseup', e => isDragging = false);
window.addEventListener('mousemove', e => {
    if(isDragging) {
        const deltaMove = {
            x: e.offsetX - previousMousePosition.x,
            y: e.offsetY - previousMousePosition.y
        };
        group.rotation.y += deltaMove.x * 0.01;
        group.rotation.x += deltaMove.y * 0.01;
    }
    previousMousePosition = { x: e.offsetX, y: e.offsetY };
});

function animate() {
    requestAnimationFrame(animate);
    group.rotation.y += 0.005;
    ring1.rotation.y += 0.01;
    ring2.rotation.z += 0.01;
    renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
    const w = container.clientWidth || window.innerWidth;
    const h = container.clientHeight || window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
});

animate();
})();
</script>
</div>
<!-- STITCH_THREEJS_END:ANIMATION_2 -->
</body>
</html>
